# 서비스 목록
services:

  # Redis 서비스 (profile celery — early tip에서는 plain up 시 미기동)
  redis:
    profiles: ["celery"]
    image: redis:7-alpine
    # 포트 포워딩
    ports:
      - "6379:6379"
    # 헬스 체크
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5


  # FastAPI 서비스
  api:
    build: ./api # ./api/Dockerfile 빌드
    depends_on:
      redis:
        condition: service_healthy
        required: false
    ports:
      - "8000:8000"

    # 환경변수
    environment:
      DATA_ROOT: /data
      MAX_UPLOAD_BYTES: "104857600" # 100MB
      ALLOWED_EXTENSIONS: "mp4,mov,webm"
      REDIS_URL: redis://redis:6379/0

    # 볼륨 마운트
    # 도커 컨테이너 안의 폴더와 내 PC의 폴더를 연결해 줘서 이 폴더를 영구적으로 보존할 수 있게 해줌
    volumes:
      - ./data:/data
      - ./static:/app/static:ro

    # 실행 시 동작할 명령어
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery 워커 (profile celery)
  worker:
    profiles: ["celery"]
    build: ./worker
    environment:
      DATA_ROOT: /data
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/data
    # 의존성 설정
    depends_on:
      redis:
        condition: service_healthy
    # 실행 파일 지정 및 로그 레벨 설정
    command: celery -A app.celery_app.celery worker --loglevel=info
