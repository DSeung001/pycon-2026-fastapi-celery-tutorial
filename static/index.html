<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>PyCon 2026 Video Tutorial</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main>
    <h1>FastAPI 환경 확인</h1>
    <p class="hint">Checkpoint 00: FastAPI 앱이 기동되는지 확인합니다.</p>
    <ul>
      <li><a href="/docs" target="_blank" rel="noopener">Swagger UI (/docs)</a></li>
      <li><a href="/api/health" target="_blank" rel="noopener">Health API (/api/health)</a></li>
    </ul>
    <pre id="result" hidden></pre>
  </main>

  <script>
    (async () => {
      const result = document.getElementById("result");
      try {
        const res = await fetch("/api/health");
        const data = await res.json();
        result.textContent = JSON.stringify(data, null, 2);
        result.hidden = false;
      } catch (error) {
        result.textContent = String(error);
        result.hidden = false;
      }
    })();
  </script>
</body>
</html>
